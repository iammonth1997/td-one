<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TD One - Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, "Noto Sans Thai", "Noto Sans", Arial, sans-serif;
        background: #ffffff;
        color: #111111;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 24px;
        text-align: center;
      }
      .title {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 0 0 8px;
      }
      .desc {
        margin: 0;
        color: #52525b;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 class="title">ออฟไลน์อยู่ชั่วคราว</h1>
      <p class="desc">ไม่พบการเชื่อมต่ออินเทอร์เน็ต กรุณาลองใหม่อีกครั้งเมื่อออนไลน์</p>
    </main>
  </body>
</html>
